version: "3.8"

# Local development / test. For Portainer Swarm use docker-stack.yml.

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8470:80"
    networks:
      - card-net
    depends_on:
      - api

  api:
    build:
      context: ./server
      dockerfile: ../Dockerfile.api
    environment:
      - DATA_DIR=/data
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID:-}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
      - PDK_CLIENT_ID=${PDK_CLIENT_ID:-}
      - PDK_CLIENT_SECRET=${PDK_CLIENT_SECRET:-}
    volumes:
      - api-data:/data
    networks:
      - card-net

volumes:
  api-data:

networks:
  card-net:
