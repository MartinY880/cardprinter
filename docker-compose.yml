version: "3.8"

# Local dev/test. For Portainer Swarm use docker-stack.yml.

services:
  card-studio:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATA_DIR=/data
      - STATIC_DIR=/app/dist
      - PORT=3000
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID:-}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
      - PDK_CLIENT_ID=${PDK_CLIENT_ID:-}
      - PDK_CLIENT_SECRET=${PDK_CLIENT_SECRET:-}
    volumes:
      - card-studio-data:/data

volumes:
  card-studio-data:
