version: "3.8"

services:
  card-studio:
    image: martinyousif88/card-printer:${TAG:-latest}
    environment:
      - DATA_DIR=/data
      - STATIC_DIR=/app/dist
      - PORT=3000
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID:-}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
      - PDK_CLIENT_ID=${PDK_CLIENT_ID:-}
      - PDK_CLIENT_SECRET=${PDK_CLIENT_SECRET:-}
    volumes:
      - card-studio-data:/data
    networks:
      - traefik_traefik-swarm
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        order: start-first
      labels:
        - traefik.enable=true
        - traefik.swarm.network=traefik_traefik-swarm
        - traefik.http.routers.optout.rule=Host(`cardprinter-dev.pros.mortgage`)
        - traefik.http.routers.optout.entrypoints=websecure
        - traefik.http.routers.optout.tls.certresolver=letsencrypt
        - traefik.http.services.optout.loadbalancer.server.port=3000
        - traefik.http.services.optout.loadbalancer.healthcheck.path=/health
        - traefik.http.services.optout.loadbalancer.healthcheck.interval=5s
        - traefik.http.services.optout.loadbalancer.healthcheck.timeout=3s

volumes:
  card-studio-data:

networks:
  traefik_traefik-swarm:
    external: true
