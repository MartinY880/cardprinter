version: "3.8"

# Portainer Swarm stack — Traefik handles routing/TLS.
# Set env vars in Portainer before deploying.

services:
  card-studio:
    image: ${REGISTRY:-}card-design-studio:${TAG:-latest}
    environment:
      - DATA_DIR=/data
      - STATIC_DIR=/app/dist
      - PORT=3000
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID:-}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
      - PDK_CLIENT_ID=${PDK_CLIENT_ID:-}
      - PDK_CLIENT_SECRET=${PDK_CLIENT_SECRET:-}
    volumes:
      - card-studio-data:/data
    networks:
      - traefik_traefik-swarm
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.card-studio.rule=Host(`cardprinter-dev.pros.mortgage`)"
        - "traefik.http.routers.card-studio.entrypoints=websecure"
        - "traefik.http.routers.card-studio.tls=true"
        - "traefik.http.routers.card-studio.tls.certresolver=letsencrypt"
        - "traefik.http.services.card-studio.loadbalancer.server.port=3000"

volumes:
  card-studio-data:

networks:
  traefik_traefik-swarm:
    external: true
