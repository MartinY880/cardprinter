server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Internal API (creds, presets, employees, printlog)
    location /api/ {
        proxy_pass http://api:8471/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Azure AD token proxy — avoids CORS issues with client credentials flow
    location ~ ^/api/token/(.+)$ {
        proxy_pass https://login.microsoftonline.com/$1/oauth2/v2.0/token;
        proxy_set_header Host login.microsoftonline.com;
        proxy_set_header Content-Type "application/x-www-form-urlencoded";
        proxy_ssl_server_name on;
    }

    # PDK auth proxy
    location /pdk/auth/ {
        proxy_pass https://accounts.pdk.io/oauth2/;
        proxy_set_header Host accounts.pdk.io;
        proxy_ssl_server_name on;
    }

    # PDK accounts API proxy
    location /pdk/accounts/ {
        proxy_pass https://accounts.pdk.io/api/;
        proxy_set_header Host accounts.pdk.io;
        proxy_ssl_server_name on;
    }

    # PDK systems API proxy
    location /pdk/systems/ {
        proxy_pass https://systems.pdk.io/;
        proxy_set_header Host systems.pdk.io;
        proxy_ssl_server_name on;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
